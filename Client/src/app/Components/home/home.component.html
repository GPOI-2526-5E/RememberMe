<div class="min-h-screen pb-32">
  <app-navbar></app-navbar>

  <div class="text-center pt-8 pb-6" data-aos="fade-down">
    <h1 class="display-5 fw-bold text-cyan-glow">REMEMBER ME</h1>
    <p class="lead opacity-80">Onora il ricordo</p>
  </div>

  <div *ngIf="showLoginSuccess" class="login-success-alert" data-aos="fade-down">
    {{ loginSuccessMessage }}
  </div>

  <div class="container">
    <div class="search-bar glass-card mb-4" data-aos="fade-up">
      <input
        type="text"
        class="form-control search-input"
        placeholder="Cerca un cimitero, città o descrizione..."
        [(ngModel)]="searchTerm"
        (input)="searchCemeteries()"
      />
      <button class="btn btn-blue search-btn" (click)="searchCemeteries()">
        Cerca
      </button>
    </div>

    <div *ngIf="errorMessage" class="search-error-card mb-4" data-aos="fade-up">
      <div class="card card-cimitero h-100">
        <div class="card-body py-3 px-4">
          <p class="mb-0">{{ errorMessage }}</p>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div *ngFor="let cem of filteredCemeteries; let i = index" 
           class="col-md-6 col-lg-4" 
           data-aos="fade-up" 
           [attr.data-aos-delay]="i * 100">
        
        <div class="card card-cimitero h-100">
          <img [src]="cem.image" class="card-img-top" alt="{{ cem.name }}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{ cem.name }}</h5>
            <p>
              {{ cem.city || cem.location }}
              <span *ngIf="cem.distance" class="distance-badge">{{ (cem.distance | number:'1.1-1') }} km</span>
            </p>
            <p class="card-text flex-grow-1">{{ cem.description }}</p>
            <a [href]="getGoogleMapsLink(cem)" target="_blank" rel="noopener" class="btn btn-outline-secondary w-100 mb-2">
              Vai su Google Maps
            </a>
            <button (click)="goToDetail(cem._id)" class="btn btn-blue w-100">
              Esplora Pianta
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-cookie-banner></app-cookie-banner>
<app-bottom-bar></app-bottom-bar>
<app-footer></app-footer>
