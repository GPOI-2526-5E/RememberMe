<app-navbar></app-navbar>
<div class="fullscreen-map-page pb-32">
  <div class="page-header">
    <button class="btn btn-outline-secondary" (click)="goBack()">← Indietro</button>
    <h2>Mappa dei cimiteri</h2>
  </div>

  <div #fullscreenMap class="fullscreen-map"></div>

  <div *ngIf="errorMessage" class="error-alert">
    <div class="error-content">
      <span class="error-icon">⚠️</span>
      <span class="error-text">{{ errorMessage }}</span>
      <button class="error-close" (click)="closeError()">×</button>
    </div>
  </div>

  <div class="map-legend">
    <div class="legend-item">
      <span class="marker marker-blue"></span>
      <span>La tua posizione</span>
    </div>
    <div class="legend-item">
      <span class="marker marker-red"></span>
      <span>Cimiteri</span>
    </div>
    <div class="legend-item">
      <span class="marker marker-route"></span>
      <span>Percorso visualizzato</span>
    </div>
  </div>
</div>
<app-cookie-banner></app-cookie-banner>
<app-bottom-bar></app-bottom-bar>
<app-footer></app-footer>
