<div class="bottom-hud">
  <div class="glass-panel">

    <button (click)="goToMap()" class="hud-btn" [class.active]="activeSection === 'map'">
      <i class="bi bi-map"></i>
      <span>MAPPA</span>
    </button>

    <button (click)="goToHome()" class="hud-btn" [class.active]="activeSection === 'home'">
      <i class="bi bi-house"></i>
      <span>HOME</span>
    </button>

    <button (click)="goToScan()" class="hud-btn" [class.active]="activeSection === 'scan'">
      <i class="bi bi-qr-code-scan"></i>
      <span>SCAN</span>
    </button>

    @if (userRole === 'user') {
      <button (click)="goToParenti()" class="hud-btn" [class.active]="activeSection === 'parenti'">
        <i class="bi bi-people"></i>
        <span>PARENTI</span>
      </button>
    } @else if (userRole === 'employee') {
      <button (click)="goToGestione()" class="hud-btn" [class.active]="activeSection === 'gestione'">
        <i class="bi bi-shield-check"></i>
        <span>GESTIONE</span>
      </button>
    } @else if (userRole === null) {
      <button (click)="goToRegister()" class="hud-btn" [class.active]="activeSection === 'register'">
        <i class="bi bi-person-plus"></i>
        <span>REGISTRATI</span>
      </button>
    }

    <button (click)="goToSettings()" class="hud-btn" [class.active]="activeSection === 'settings'">
      <i class="bi bi-gear"></i>
      <span>IMPOSTAZIONI</span>
    </button>
  </div>
</div>
