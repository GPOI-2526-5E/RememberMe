<app-navbar></app-navbar>

<div class="login-container pb-32">
  <header class="login-header">
    <button class="back-btn mobile-only" (click)="goBack()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <h1>Accedi</h1>
    <div class="header-spacer"></div>
  </header>

  <section class="login-section">
    <div class="login-card glass-card">
      <div class="login-icon">
        <i class="bi bi-box-arrow-in-right"></i>
      </div>
      
      <h2>Benvenuto</h2>
      <p class="login-subtitle">Accedi al tuo account per continuare</p>

      <form (submit)="handleLogin($event)" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email"
            placeholder="Inserisci la tua email" 
            [(ngModel)]="loginEmail" 
            name="email" 
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password"
            placeholder="Inserisci la tua password" 
            [(ngModel)]="loginPassword" 
            name="password" 
            required>
        </div>

        <button type="submit" class="login-btn primary">
          <i class="bi bi-box-arrow-in-right"></i>
          Accedi
        </button>
      </form>

      <div class="login-divider">
        <span>oppure</span>
      </div>

      <div class="alternative-login">
        <button type="button" class="social-btn google">
          <i class="bi bi-google"></i>
          Google
        </button>
        <button type="button" class="social-btn facebook">
          <i class="bi bi-facebook"></i>
          Facebook
        </button>
      </div>

      <div class="login-footer">
        <p>Non hai un account? <a routerLink="/register">Registrati</a></p>
        <p><a href="#forgot-password">Password dimenticata?</a></p>
      </div>
    </div>
  </section>
</div>

<app-cookie-banner></app-cookie-banner>
<app-bottom-bar></app-bottom-bar>
<app-footer></app-footer>
