<app-navbar></app-navbar>
<div class="register-page pb-32">
  <div class="register-card glass-card">
    <div class="register-header">
      <h1>Registrazione</h1>
      <p>Apri il tuo spazio per custodire i ricordi e connetterti ai familiari.</p>
    </div>

    <form (submit)="handleRegister($event)" class="register-form">
      <div class="form-row">
        <label for="fullName">Nome completo</label>
        <input id="fullName" type="text" [(ngModel)]="registerFullName" name="fullName" required placeholder="Mario Rossi">
      </div>

      <div class="form-row">
        <label for="username">Nome utente</label>
        <input id="username" type="text" [(ngModel)]="registerUsername" name="username" placeholder="mariorossi">
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="registerEmail" name="email" required placeholder="nome@example.com">
      </div>

      <div class="form-row">
        <label for="password">Password *</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="registerPassword"
          name="password"
          required
          placeholder="••••••••"
          (input)="checkPasswordStrength()"
        />
        <div class="password-strength" *ngIf="registerPassword">
          <div class="strength-bar">
            <div class="strength-fill" 
                 [style.width.%]="passwordStrength"
                 [class.weak]="passwordStrength < 40"
                 [class.medium]="passwordStrength >= 40 && passwordStrength < 70"
                 [class.strong]="passwordStrength >= 70">
            </div>
          </div>
          <p class="strength-text">
            <span *ngIf="passwordStrength < 40" class="weak">Debole</span>
            <span *ngIf="passwordStrength >= 40 && passwordStrength < 70" class="medium">Media</span>
            <span *ngIf="passwordStrength >= 70" class="strong">Forte</span>
          </p>
        </div>
      </div>

      <div class="form-row">
        <label for="confirmPassword">Conferma Password *</label>
        <input
          id="confirmPassword"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          placeholder="••••••••"
        />
      </div>

      <div class="password-requirements">
        <p>La password deve contenere:</p>
        <ul>
          <li [class.valid]="hasMinLength">
            <i class="bi" [class.bi-check-circle]="hasMinLength" [class.bi-circle]="!hasMinLength"></i>
            Almeno 8 caratteri
          </li>
          <li [class.valid]="hasUpperCase">
            <i class="bi" [class.bi-check-circle]="hasUpperCase" [class.bi-circle]="!hasUpperCase"></i>
            Una lettera maiuscola
          </li>
          <li [class.valid]="hasLowerCase">
            <i class="bi" [class.bi-check-circle]="hasLowerCase" [class.bi-circle]="!hasLowerCase"></i>
            Una lettera minuscola
          </li>
          <li [class.valid]="hasNumber">
            <i class="bi" [class.bi-check-circle]="hasNumber" [class.bi-circle]="!hasNumber"></i>
            Un numero
          </li>
          <li [class.valid]="hasSpecialChar">
            <i class="bi" [class.bi-check-circle]="hasSpecialChar" [class.bi-circle]="!hasSpecialChar"></i>
            Un carattere speciale (!&#64;#$%^&*)
          </li>
        </ul>
      </div>

      <button type="submit" class="btn btn-blue register-btn" [disabled]="isSubmitting || !isPasswordValid()">
        {{ isSubmitting ? 'Registrazione in corso...' : 'Crea account' }}
      </button>

      <p class="login-link">
        Hai già un account? <a routerLink="/settings">Accedi</a>
      </p>
    </form>
  </div>
</div>
<app-footer></app-footer>
