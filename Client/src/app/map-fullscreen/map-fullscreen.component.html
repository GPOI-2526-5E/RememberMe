<div class="fullscreen-map-page">
  <div class="page-header">
    <button class="btn btn-outline-secondary" (click)="goBack()">← Indietro</button>
    <h2>Mappa dei cimiteri</h2>
  </div>

  <div *ngIf="errorMessage" class="alert alert-warning mx-3">{{ errorMessage }}</div>

  <div #fullscreenMap class="fullscreen-map"></div>

  <div class="map-legend">
    <div class="legend-item">
      <span class="marker marker-blue"></span>
      <span>La tua posizione</span>
    </div>
    <div class="legend-item">
      <span class="marker marker-red"></span>
      <span>Cimiteri</span>
    </div>
  </div>
</div>
<app-cookie-banner></app-cookie-banner>
<app-bottom-bar></app-bottom-bar>
